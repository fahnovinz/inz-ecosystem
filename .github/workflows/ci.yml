name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify CLI loads
        run: node bin/inz.js help

      - name: Smoke test stats command
        run: node bin/inz.js stats octocat || true

      - name: Verify source files syntax
        run: |
          node --check bin/inz.js
          node --check src/github-stats.js
          node --check src/github-api.js
          node --check src/report.js