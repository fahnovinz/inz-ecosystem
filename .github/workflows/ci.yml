name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: node --test test/*.test.js

      - name: Verify CLI
        run: node bin/inz.js help

      - name: Smoke test (live API)
        run: |
          node bin/inz.js stats octocat || true
          node bin/inz.js health fahnovinz/inz-ecosystem || true

      - name: Syntax check
        run: |
          node --check bin/inz.js
          node --check src/github-stats.js
          node --check src/repo-health.js
          node --check src/badges.js
          node --check src/github-api.js
          node --check src/report.js
          node --check src/utils.js