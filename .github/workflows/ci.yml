name: CI

# Runs manually until GitHub Actions is enabled on your account.
# Auto-runs on push were failing instantly (no runner assigned) — usually
# billing/spending limit or email verification on new accounts.
#
# Enable auto-runs later: uncomment the push/pull_request triggers below
# after fixing https://github.com/settings/billing

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: node --test test/*.test.js

      - name: Verify CLI
        run: node bin/inz.js help

      - name: Syntax check
        run: |
          node --check bin/inz.js
          node --check src/github-stats.js
          node --check src/repo-health.js
          node --check src/badges.js
          node --check src/github-api.js
          node --check src/report.js
          node --check src/utils.js